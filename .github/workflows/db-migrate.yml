name: DB Migrate

on:
  push:
    branches: [main, release]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: db-migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate-preview:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: preview
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link preview project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Dry run preview migrations
        run: supabase db push --dry-run

      - name: Apply preview migrations
        run: supabase db push

  migrate-production:
    if: github.ref_name == 'release'
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Dry run production migrations
        run: supabase db push --dry-run

      - name: Apply production migrations
        run: supabase db push
