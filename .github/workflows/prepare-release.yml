name: Prepare Release (main -> release)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.2.0)"
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure we run only on main
        if: github.ref_name != 'main'
        run: |
          echo "This workflow must be run on the 'main' branch. Current: ${{ github.ref_name }}"
          exit 1

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Fail if tag already exists
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ inputs.version }} already exists."
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Bump version (package.json)
        run: pnpm version ${{ inputs.version }} --no-git-tag-version

      - name: Commit version bump to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json pnpm-lock.yaml
          git commit -m "chore(release): v${{ inputs.version }}"

          git push origin HEAD:main

      - name: Tag and push
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ inputs.version }}
          generate_release_notes: true

      - name: Update release branch to match main (fast-forward)
        run: |
          # Make sure we have the latest remote state
          git fetch origin main release --force

          # Create local release branch tracking origin/release
          git checkout -B release origin/release

          # Fast-forward release to origin/main (will fail if not possible)
          git merge --ff-only origin/main

          # Push updated release branch
          git push origin release
