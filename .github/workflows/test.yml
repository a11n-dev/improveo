name: Tests

on:
  pull_request:
    branches: [main, release]
  push:
    branches: [main, release]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Export local Supabase env and create .env.test
        run: |
          while IFS='=' read -r key rawValue; do
            if [ -z "$key" ]; then
              continue
            fi

            value="${rawValue#\"}"
            value="${value%\"}"
            echo "$key=$value" >> "$GITHUB_ENV"
            export "$key=$value"
          done < <(supabase status -o env)

          {
            printf 'SUPABASE_URL=%s\n' "$API_URL"
            printf 'SUPABASE_KEY=%s\n' "$PUBLISHABLE_KEY"
            printf 'SUPABASE_SECRET_KEY=%s\n' "$SERVICE_ROLE_KEY"
            printf 'NUXT_PUBLIC_SUPABASE_URL=%s\n' "$API_URL"
            printf 'NUXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=%s\n' "$PUBLISHABLE_KEY"
          } > .env.test

      - name: Reset and seed local DB
        run: pnpm supabase:seed

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run Nuxt tests
        run: pnpm test:nuxt
