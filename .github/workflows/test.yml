name: Tests

on:
  pull_request:
    branches: [main, release]
  push:
    branches: [main, release]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.75.5

      - name: Start local Supabase
        run: pnpm run supabase:start

      - name: Sync local Supabase env files
        run: pnpm run supabase:env:sync

      - name: Export .env.test values for later steps
        run: |
          while IFS='=' read -r key value; do
            if [ -z "$key" ]; then
              continue
            fi

            echo "$key=$value" >> "$GITHUB_ENV"
          done < .env.test

      - name: Reset and seed local DB
        run: pnpm run supabase:reset

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run Nuxt tests
        run: pnpm test:nuxt
